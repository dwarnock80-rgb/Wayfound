workflows:
  ios-ci:
    name: Wayfound iOS CI
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      vars:
        XCODE_PROJECT: "Wayfound.xcodeproj"
        XCODE_SCHEME: "Wayfound"
    scripts:
      - name: Show Xcode version
        script: xcodebuild -version
      - name: Build simulator app
        script: |
          mkdir -p /tmp/xcodebuild_logs
          set +e
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            > /tmp/xcodebuild_logs/simulator-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "---- Swift/Xcode errors ----"
            grep -n -B 4 -A 10 "error:" /tmp/xcodebuild_logs/simulator-build.log || true
            echo "---- Last 120 build log lines ----"
            tail -120 /tmp/xcodebuild_logs/simulator-build.log
          fi
          exit "$status"
    artifacts:
      - /tmp/xcodebuild_logs/*.log

  ios-release:
    name: Wayfound iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: "com.danielwarnock.wayfound"
      vars:
        XCODE_PROJECT: "Wayfound.xcodeproj"
        XCODE_SCHEME: "Wayfound"
        BUNDLE_ID: "com.danielwarnock.wayfound"
    scripts:
      - name: Show Xcode version
        script: xcodebuild -version
      - name: Apply Codemagic signing profiles
        script: xcode-project use-profiles
      - name: Build signed IPA
        script: xcode-project build-ipa --project "$XCODE_PROJECT" --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
